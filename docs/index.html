<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking de Fundos — CAGR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2f0eb;
    --surface2: #e8e5dd;
    --border: rgba(0,0,0,0.09);
    --border-strong: rgba(0,0,0,0.20);
    --text: #1c1a16;
    --muted: #8c8880;
    --green: #1d6b45;
    --red: #a02828;
    --amber: #8a5000;
    --rule: #c8c4ba;
  }
  [data-theme=dark] {
    --bg: #16140f;
    --surface2: #1e1c17;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.18);
    --text: #ede9e0;
    --muted: #6a6660;
    --green: #3aad72;
    --red: #d95f5f;
    --amber: #c07b28;
    --rule: #2a2720;
  }

  body {
    font-family: 'DM Mono', 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 3rem 2rem 6rem;
    max-width: 1080px;
    margin: 0 auto;
    transition: background 0.2s, color 0.2s;
  }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 1.1rem;
    border-bottom: 1.5px solid var(--text);
    margin-bottom: 1.8rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  h1 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 2.4rem;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; }
  .subtitle {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .theme-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .theme-btn:hover { color: var(--text); border-color: var(--text); }

  /* ── Status ── */
  .status-bar {
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1.8rem;
  }
  .status-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 7px; vertical-align: middle; background: var(--muted); }
  .status-dot.loading { background: var(--amber); animation: pulse 1.2s infinite; }
  .status-dot.ok      { background: var(--green); }
  .status-dot.error   { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 740px; }

  thead tr { border-bottom: 1px solid var(--border-strong); }
  thead th {
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 16px 10px;
    text-align: right;
    white-space: nowrap;
    user-select: none;
    background: transparent;
    transition: color 0.15s;
    font-weight: 400;
  }
  thead th:first-child { text-align: left; padding-left: 0; }
  thead th.sortable { cursor: pointer; }
  thead th.sortable:hover { color: var(--text); }
  thead th.sorted-desc, thead th.sorted-asc { color: var(--text); font-weight: 500; }

  tbody tr.fund-row { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  tbody tr.fund-row:hover { background: var(--surface2); }
  tbody tr.detail-row { border-bottom: 1px solid var(--border); }
  tbody tr.detail-row td { padding: 0; }
  tbody tr.ibov-row { border-bottom: 1px solid var(--border); }
  tbody tr.ibov-row td { opacity: 0.55; }
  tbody tr.ibov-row:last-child { border-bottom: none; }

  td { padding: 13px 16px; font-size: 0.78rem; text-align: right; vertical-align: middle; }
  td:first-child { text-align: left; padding-left: 0; }

  /* ── Rank ── */
  .rank {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 20px;
    font-size: 0.6rem; font-weight: 400;
    color: var(--muted);
    margin-right: 10px; flex-shrink: 0;
  }
  .rank.r1, .rank.r2, .rank.r3 { color: var(--text); }
  .rank.r1::after { content: '·'; color: #b8860b; margin-left: 2px; font-size: 0.9rem; line-height: 0; vertical-align: -1px; }
  .rank.ibov { font-size: 0.5rem; color: var(--muted); letter-spacing: 0.05em; }

  .fund-name-cell { display: flex; align-items: center; min-width: 210px; }
  .fund-name  { font-size: 0.8rem; line-height: 1.3; font-weight: 400; }
  .fund-cnpj  { font-size: 0.58rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.02em; }
  .expand-arrow { font-size: 0.5rem; color: var(--muted); margin-left: 6px; display: inline-block; transition: transform 0.2s; }

  .cagr-val     { font-size: 0.8rem; font-weight: 500; }
  .cagr-val.pos { color: var(--green); }
  .cagr-val.neg { color: var(--red); }
  .cagr-val.na  { color: var(--muted); font-weight: 300; font-size: 0.7rem; }
  .tenure       { font-size: 0.7rem; color: var(--muted); font-weight: 300; }

  /* ── Detail panel ── */
  .detail-panel { overflow: hidden; max-height: 0; transition: max-height 0.28s ease; }
  .detail-panel.open { max-height: 300px; }
  .detail-inner {
    display: grid;
    grid-template-columns: 1.4fr 1fr repeat(4,1fr);
    padding: 1rem 1rem 1.1rem 0;
    border-top: 1px solid var(--border);
    gap: 0;
    background: var(--surface2);
    padding: 1rem 1rem 1.1rem;
    margin: 0;
  }
  .ditem { padding-right: 1rem; }
  .dlabel { font-size: 0.54rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 4px; font-weight: 400; }
  .dval   { font-size: 0.74rem; color: var(--text); line-height: 1.4; font-weight: 400; }
  .dnote  { font-size: 0.58rem; color: var(--muted); margin-top: 3px; }
  .tag    { display: inline-block; font-size: 0.54rem; padding: 1px 5px; margin-left: 4px; vertical-align: middle; border: 0.5px solid currentColor; letter-spacing: 0.05em; }
  .tag-rv  { color: var(--green); }
  .tag-tr  { color: var(--amber); }

  /* ── Skeleton ── */
  .skeleton { display: inline-block; height: 11px; border-radius: 1px; background: var(--border); animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

  /* ── Footer ── */
  .footer {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--rule);
    display: flex;
    gap: 2.5rem;
    flex-wrap: wrap;
  }
  .footer span { font-size: 0.58rem; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }

  @media (max-width: 700px) {
    body { padding: 2rem 1.2rem 4rem; }
    h1   { font-size: 1.8rem; }
    .detail-inner { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Ranking de Fundos</h1>
  <div class="header-right">
    <div class="subtitle">CAGR · dados diários CVM · atualizado automaticamente</div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☽ escuro</button>
  </div>
</div>

<div class="status-bar">
  <div><span class="status-dot loading" id="statusDot"></span><span id="statusText">Carregando dados…</span></div>
  <div id="statusDate"></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#&nbsp;&nbsp;Fundo</th>
        <th class="sortable" data-key="cagr12"    id="th-cagr12">12M ↕</th>
        <th class="sortable" data-key="cagr36"    id="th-cagr36">36M ↕</th>
        <th class="sortable" data-key="cagr60"    id="th-cagr60">60M ↕</th>
        <th class="sortable" data-key="inception" id="th-inception">Início ↕</th>
        <th class="sortable" data-key="tenure"    id="th-tenure">Track Record ↕</th>
      </tr>
    </thead>
    <tbody id="fundBody"></tbody>
  </table>
</div>

<div class="footer">
  <span>CAGR = taxa de crescimento anual composta</span>
  <span>N/D = dados insuficientes para o período</span>
  <span>Fonte: CVM / inf_diario_fi · IBOV: Yahoo Finance</span>
</div>

<script>
// ── Fund metadata ─────────────────────────────────────────────────────────────
const FUND_META = {
  "22.232.927/0001-90": { nome:"Tarpon GT",         inception:"2010-07-12", initialQuota:1.2136, tipo:"Long Only",    trib:"RV", expo:"Brasil",                  banco:"BTG",      obs:"" },
  "17.400.251/0001-66": { nome:"Organon",            inception:"2013-02-22", initialQuota:1.0000, tipo:"Long Only",    trib:"RV", expo:"Brasil",                  banco:"Itaú",     obs:"" },
  "18.302.338/0001-63": { nome:"Ártica Long Term",   inception:"2013-06-27", initialQuota:0.7647, tipo:"Long Only",    trib:"RV", expo:"Majoritariamente Brasil",  banco:"BTG / C6", obs:"" },
  "37.495.383/0001-26": { nome:"Genoa Arpa",         inception:"2021-04-30", initialQuota:1.0000, tipo:"Long Biased",  trib:"RV", expo:"Majoritariamente Brasil",  banco:"C6",       obs:"" },
  "42.698.666/0001-05": { nome:"Artax Ultra",        inception:"2022-05-31", initialQuota:1.0000, tipo:"Long Biased",  trib:"RV", expo:"Internacional",            banco:"Itaú",     obs:"Melhor versão: Itaú Artax Endurance (tributação RV)" },
  "24.623.392/0001-03": { nome:"Guepardo Long Bias", inception:"2016-07-11", initialQuota:1.0000, tipo:"Long Biased",  trib:"RV", expo:"Brasil",                  banco:"Itaú",     obs:"" },
  "28.747.685/0001-53": { nome:"Kapitalo Tarkus",    inception:"2017-11-06", initialQuota:1.0000, tipo:"Long Biased",  trib:"RV", expo:"Brasil",                  banco:"XP",       obs:"" },
  "10.500.884/0001-05": { nome:"Real Investor",      inception:"2012-02-29", initialQuota:3.6300, tipo:"Long Only",    trib:"RV", expo:"Brasil",                  banco:"Itaú",     obs:"" },
  "35.744.790/0001-02": { nome:"Schroder Tech L&S",  inception:"2020-04-01", initialQuota:1.0000, tipo:"Multimercado", trib:"TR", expo:"Internacional",            banco:"BTG",      obs:"" },
  "38.954.217/0001-03": { nome:"Pátria Long Biased", inception:"2020-10-30", initialQuota:1.0000, tipo:"Long Biased",  trib:"RV", expo:"Brasil",                  banco:"Itaú",     obs:"" },
  "32.073.525/0001-43": { nome:"Absolute Pace",      inception:"2018-12-27", initialQuota:1.0000, tipo:"Long Only",    trib:"RV", expo:"Brasil",                  banco:"Itaú",     obs:"" },
  "21.689.246/0001-92": { nome:"Arbor",              inception:"2015-03-23", initialQuota:1.0000, tipo:"Long Only",    trib:"RV", expo:"Internacional",            banco:"BTG",      obs:"" },
  "14.438.229/0001-17": { nome:"Charles River",      inception:"2011-11-07", initialQuota:1.0000, tipo:"Long Only",    trib:"RV", expo:"Brasil",                  banco:"C6",       obs:"" },
  "17.397.315/0001-17": { nome:"SPX Falcon",         inception:"2012-09-17", initialQuota:1.0000, tipo:"Long Biased",  trib:"RV", expo:"Majoritariamente Brasil",  banco:"Itaú",     obs:"" },
};
const TRIB_LABEL = { RV:"Renda Variável", TR:"Tabela Regressiva" };

// ── Theme ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? '' : 'dark');
  document.getElementById('themeBtn').textContent = dark ? '☽ escuro' : '☀ claro';
  localStorage.setItem('theme', dark ? 'light' : 'dark');
}
(function() {
  if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeBtn').textContent = '☀ claro';
  }
})();

// ── State ─────────────────────────────────────────────────────────────────────
let funds        = [];
let ibov         = { cagr12: null, cagr36: null, cagr60: null };
let currentSort  = 'cagr36';
let sortDir      = 1;
let expandedCnpj = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtPct(v) {
  if (v === null || v === undefined || isNaN(v))
    return '<span class="cagr-val na">N/D</span>';
  const sign = v >= 0 ? '+' : '';
  return `<span class="cagr-val ${v >= 0 ? 'pos' : 'neg'}">${sign}${v.toFixed(2)}%</span>`;
}

function fmtTenure(cnpj) {
  const meta = FUND_META[cnpj];
  const d = meta && meta.inception ? meta.inception : null;
  if (!d) return '<span class="tenure">—</span>';
  const start = new Date(d + 'T00:00:00'), today = new Date();
  let years  = today.getFullYear() - start.getFullYear();
  let months = today.getMonth()    - start.getMonth();
  if (today.getDate() < start.getDate()) months--;
  if (months < 0) { years--; months += 12; }
  const parts = [];
  if (years  > 0) parts.push(years  + ' ano'  + (years  !== 1 ? 's' : ''));
  if (months > 0) parts.push(months + ' mes'  + (months !== 1 ? 'es' : ''));
  return `<span class="tenure">${parts.join(' e ') || '< 1 mes'}</span>`;
}

function tenureDays(cnpj) {
  const meta = FUND_META[cnpj];
  const d = meta && meta.inception ? meta.inception : null;
  return d ? (new Date() - new Date(d + 'T00:00:00')) / 86400000 : 0;
}

function cagrInception(f) {
  const meta = FUND_META[f.cnpjFmt];
  if (!meta || !meta.inception || !f.latestDate) return f.cagrInception ?? null;
  const inceptionQuota = meta.initialQuota ?? 1.0;
  const latestQuota    = f.latestQuota;
  if (!latestQuota) return f.cagrInception ?? null;
  const years = (new Date(f.latestDate) - new Date(meta.inception)) / (365.25 * 86400000);
  if (years <= 0) return null;
  return (Math.pow(latestQuota / inceptionQuota, 1 / years) - 1) * 100;
}

function getSortVal(f, key) {
  if (key === 'tenure')    return tenureDays(f.cnpjFmt);
  if (key === 'inception') return cagrInception(f) ?? -Infinity;
  return f[key] ?? -Infinity;
}

// ── Sort ──────────────────────────────────────────────────────────────────────
function sortBy(key) {
  if (currentSort === key) { sortDir *= -1; }
  else { currentSort = key; sortDir = 1; }
  updateHeaders();
  render();
}

const TH_LABELS = { cagr12:'12M', cagr36:'36M', cagr60:'60M', inception:'Início', tenure:'Track Record' };

function updateHeaders() {
  Object.keys(TH_LABELS).forEach(k => {
    const th = document.getElementById('th-' + k);
    if (!th) return;
    th.classList.remove('sorted-asc','sorted-desc');
    if (k === currentSort) {
      th.classList.add(sortDir === 1 ? 'sorted-desc' : 'sorted-asc');
      th.textContent = TH_LABELS[k] + (sortDir === 1 ? ' ↓' : ' ↑');
    } else {
      th.textContent = TH_LABELS[k] + ' ↕';
    }
  });
}

// ── Toggle detail ─────────────────────────────────────────────────────────────
function toggleDetail(cnpj) {
  expandedCnpj = expandedCnpj === cnpj ? null : cnpj;
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const sorted = [...funds].sort((a, b) =>
    sortDir * (getSortVal(b, currentSort) - getSortVal(a, currentSort))
  );

  // Find IBOV rank position for numeric sorts
  let ibovPos = null;
  if (['cagr12','cagr36','cagr60'].includes(currentSort)) {
    const iv = ibov[currentSort];
    if (iv !== null) {
      ibovPos = sorted.findIndex(f => sortDir * getSortVal(f, currentSort) < sortDir * iv);
      if (ibovPos === -1) ibovPos = sorted.length;
    }
  }

  let html = '';
  sorted.forEach((f, i) => {
    if (ibovPos !== null && i === ibovPos) html += buildIbovRow();

    const meta  = FUND_META[f.cnpjFmt] || {};
    const nome  = meta.nome || f.name;
    const rc    = sortDir === 1 ? (i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '') : '';
    const id    = (f.cnpjFmt || '').replace(/[^a-z0-9]/gi, '');
    const isExp = expandedCnpj === f.cnpjFmt;

    if (f.error) {
      html += `<tr class="fund-row" onclick="toggleDetail('${f.cnpjFmt}')">
        <td><div class="fund-name-cell">
          <span class="rank ${rc}">${i+1}</span>
          <div><div class="fund-name">${nome}</div><div class="fund-cnpj">${f.cnpjFmt}</div></div>
        </div></td>
        <td colspan="5" style="text-align:center;font-family:'Courier New',monospace;font-size:0.72rem;color:var(--red)">dados não encontrados na CVM</td>
      </tr>
      <tr class="detail-row"><td colspan="6"></td></tr>`;
      return;
    }

    const tribClass = meta.trib === 'RV' ? 'tag-rv' : 'tag-tr';
    const intl      = meta.expo && meta.expo.includes('Internacional');

    html += `
    <tr class="fund-row" onclick="toggleDetail('${f.cnpjFmt}')">
      <td><div class="fund-name-cell">
        <span class="rank ${rc}">${i+1}</span>
        <div>
          <div class="fund-name">${nome} <span class="expand-arrow" style="transform:${isExp?'rotate(180deg)':'none'}">▾</span></div>
          <div class="fund-cnpj">${f.cnpjFmt}</div>
        </div>
      </div></td>
      <td>${fmtPct(f.cagr12)}</td>
      <td>${fmtPct(f.cagr36)}</td>
      <td>${fmtPct(f.cagr60)}</td>
      <td>${fmtPct(cagrInception(f))}</td>
      <td>${fmtTenure(f.cnpjFmt)}</td>
    </tr>
    <tr class="detail-row"><td colspan="6">
      <div class="detail-panel ${isExp?'open':''}" id="detail-${id}">
        <div class="detail-inner">
          <div class="ditem">
            <div class="dlabel">Nome completo</div>
            <div class="dval" style="font-size:0.72rem">${f.name}</div>
          </div>
          <div class="ditem">
            <div class="dlabel">Início</div>
            <div class="dval">${meta.inception ? meta.inception.split('-').reverse().join('/') : '—'}</div>
          </div>
          <div class="ditem">
            <div class="dlabel">Tipo</div>
            <div class="dval">${meta.tipo || '—'}</div>
          </div>
          <div class="ditem">
            <div class="dlabel">Tributação</div>
            <div class="dval">${TRIB_LABEL[meta.trib] || meta.trib || '—'} <span class="tag ${tribClass}">${meta.trib || '—'}</span></div>
          </div>
          <div class="ditem">
            <div class="dlabel">Exposição</div>
            <div class="dval">${meta.expo || '—'}</div>
          </div>
          <div class="ditem">
            <div class="dlabel">Melhor banco</div>
            <div class="dval">${meta.banco || '—'}</div>
            ${meta.obs ? `<div class="dnote">${meta.obs}</div>` : ''}
          </div>
        </div>
      </div>
    </td></tr>`;
  });

  if (ibovPos === null) html += buildIbovRow();

  document.getElementById('fundBody').innerHTML = html;
}

function buildIbovRow() {
  return `<tr class="ibov-row">
    <td><div class="fund-name-cell">
      <span class="rank ibov">IBOV</span>
      <div>
        <div class="fund-name">Ibovespa</div>
        <div class="fund-cnpj">referência · Yahoo Finance</div>
      </div>
    </div></td>
    <td>${fmtPct(ibov.cagr12)}</td>
    <td>${fmtPct(ibov.cagr36)}</td>
    <td>${fmtPct(ibov.cagr60)}</td>
    <td><span class="cagr-val na">—</span></td>
    <td><span class="tenure">—</span></td>
  </tr>`;
}

// ── Load data.json ────────────────────────────────────────────────────────────
async function load() {
  try {
    const res  = await fetch('data.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    funds = data.funds;

    const dot    = document.getElementById('statusDot');
    const text   = document.getElementById('statusText');
    const dateEl = document.getElementById('statusDate');
    const errors = funds.filter(f => f.error).length;
    dot.className = errors ? 'status-dot error' : 'status-dot ok';
    text.textContent = errors
      ? `${funds.length - errors} de ${funds.length} fundos carregados (${errors} com erro)`
      : `${funds.length} fundos · dados da CVM`;

    const dates = funds.filter(f => f.latestDate).map(f => f.latestDate).sort();
    if (dates.length) {
      const [y,m,d] = dates[dates.length-1].split('-');
      dateEl.textContent = `Última cota: ${d}/${m}/${y}`;
    }
    if (data.generatedAt) {
      const gen = new Date(data.generatedAt);
      const pad = n => String(n).padStart(2,'0');
      dateEl.textContent += ` · gerado ${pad(gen.getUTCDate())}/${pad(gen.getUTCMonth()+1)} às ${pad(gen.getUTCHours())}:${pad(gen.getUTCMinutes())} UTC`;
    }

    updateHeaders();
    render();
    // Load IBOV from data.json (fetched server-side by Python script)
    if (data.ibov) {
      ibov = data.ibov;
      render();
    }

  } catch(e) {
    document.getElementById('statusDot').className = 'status-dot error';
    document.getElementById('statusText').textContent = 'Erro ao carregar data.json: ' + e.message;
  }
}

// ── Skeleton ──────────────────────────────────────────────────────────────────
document.getElementById('fundBody').innerHTML = Array.from({length:14}, (_,i) => `<tr class="fund-row">
  <td><div class="fund-name-cell"><span class="rank">${i+1}</span>
    <div><span class="skeleton" style="width:${130+Math.random()*70|0}px;display:block;margin-bottom:5px"></span>
         <span class="skeleton" style="width:110px;height:10px"></span></div>
  </div></td>
  ${Array.from({length:5},()=>`<td><span class="skeleton" style="width:56px"></span></td>`).join('')}
</tr>`).join('');

document.querySelectorAll('thead th[data-key]').forEach(th =>
  th.addEventListener('click', () => sortBy(th.dataset.key))
);

updateHeaders();
load();
</script>
</body>
</html>
